name: 52-Week Screen Snapshot

on:
  schedule:
    - cron: "*/30 * * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: screen-snapshot
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 52-week screen
        run: python build_snapshot.py

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_screen.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update 52-week screen snapshot [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) - rebasing onto latest main..."
            git pull --rebase --autostash origin main || git rebase --abort
            sleep $((RANDOM % 5 + 3))
          done
          echo "Failed to push after 5 attempts."
          exit 1
