name: 52-Week Screen Snapshot

# Runs the headless screener on a schedule and commits data/latest_screen.json.
# The Streamlit dashboard reads that file so users see fresh results instantly.

on:
  schedule:
    # Every 30 minutes, Monday–Friday (times are UTC). NSE trades ~03:45–10:00 UTC.
    # Weekends are skipped because 52-week levels don't change when markets are shut.
    # (To run literally 24/7 incl. weekends, change to: "*/30 * * * *")
    - cron: "*/30 * * * 1-5"
  workflow_dispatch: {}        # lets you trigger a run manually from the Actions tab

permissions:
  contents: write              # required to commit the updated snapshot back to the repo

concurrency:
  group: screen-snapshot       # never let two runs overlap
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 52-week screen
        run: python build_snapshot.py

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_screen.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update 52-week screen snapshot [skip ci]"
            git push
          fi
